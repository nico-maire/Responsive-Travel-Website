<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TRADUCCIÓN: Título de la pestaña -->
  <meta name="i18n-title" content="page_login_title">

  <title>Iniciar Sesión</title>
  <link rel="icon" href="images/travel-svgrepo-com.svg" type="image/x-icon">
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header></header>


  <div class="main-container">

    <h1 class="title" data-i18n="login_h1">¡ Hola de nuevo !</h1>
    <h2 class="subtitle" data-i18n="login_h2">Te echábamos de menos</h2>

    <div class="form-card">
      <form id="loginForm">

        <div class="form-group">
          <label for="email" data-i18n="label_email">Correo</label>
          <input type="email" id="email" placeholder="tu@email.com" data-i18n-placeholder="ph_email"
            aria-label="Correo electrónico" data-i18n-aria="label_email">
        </div>

        <div class="form-group">
          <label for="password" data-i18n="label_password">Contraseña</label>
          <input type="password" id="password" placeholder="********" data-i18n-placeholder="ph_password"
            aria-label="Contraseña" data-i18n-aria="label_password">
        </div>

        <button type="submit" class="btn-signin" data-i18n="btn_signin">Sign In</button>

        <div class="forgot-password">
          <a href="#" data-i18n="link_forgot">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- ✅ Estructura mejorada para traducir texto y enlace por separado -->
        <div style="margin-top: 20px; text-align: center; font-size: 0.9rem; color: #666;">
          <span data-i18n="text_no_account">¿No tienes cuenta?</span>
          <a href="register.html" style="color: #333; font-weight: 600; text-decoration: underline;"
            data-i18n="link_register_here">Regístrate aquí</a>
        </div>

      </form>
    </div>
  </div>

  <div class="contact-component"></div>

  <footer></footer>

  <!-- ✅ SCRIPTS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module" src="script/app.js"></script>

</body>

</html>
