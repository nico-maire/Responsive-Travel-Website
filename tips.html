<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- TRADUCCIÓN: Título de la pestaña -->
  <meta name="i18n-title" content="page_tips_title">
  <meta name="i18n-description" content="page_tips_desc">

  <title>Consejos - Wanderlust Travels</title>
  <link rel="icon" href="images/travel-svgrepo-com.svg" type="image/x-icon">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/pages/tips.css">
  <!-- Asegúrate de tener FontAwesome si usas los iconos fa-search -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body id="page-tips">

  <header></header>

  <!-- Community Navigation Tabs -->
  <div class="tabs-navigation">
    <div class="tabs-container">
      <a href="community.html" class="tab-btn" data-i18n="tab_all">Todo</a>
      <a href="forum.html" class="tab-btn" data-i18n="nav_forum">Foro</a>
      <a href="blog.html" class="tab-btn" data-i18n="nav_blog">Blog</a>
      <a class="tab-btn active" data-i18n="tab_tips">Consejos</a>
    </div>
  </div>

  <main class="section">
    <div class="container">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem;">
        <h2 data-i18n="tips_header">Consejos de la Comunidad</h2>

        <div style="display:flex; gap:0.75rem; align-items:center;">
          <div style="min-width:240px; max-width:420px; position:relative;">
            <div class="forum-search-bar" style="margin:0;">
              <input id="tips-search" class="forum-search-input" type="search" placeholder="Buscar consejos..."
                data-i18n-placeholder="tips_search_ph" aria-label="Buscar consejos" data-i18n-aria="tips_search_aria">
              <i class="fa fa-search search-icon" aria-hidden="true"
                style="position:absolute; right:14px; top:12px; color:#888;"></i>
            </div>
          </div>

          <!-- Botón para crear un tip -->
          <button id="btn-open-tip-modal" class="btn-primary" style="white-space:nowrap;"
            data-i18n="btn_create_tip">Crear Consejo</button>
        </div>
      </div>

      <!-- Modal para crear tip -->
      <div id="create-tip-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
          <h3 data-i18n="modal_tip_title">Crear nuevo consejo</h3>
          <form id="new-tip-form" class="modal-form">

            <label for="tip-title" data-i18n="label_tip_title">Título</label>
            <input id="tip-title" type="text" required placeholder="Ej: Ahorra en vuelos..."
              data-i18n-placeholder="ph_tip_title">

            <label for="tip-text" data-i18n="label_tip_content">Consejo</label>
            <textarea id="tip-text" required placeholder="Comparte tu consejo..."
              data-i18n-placeholder="ph_tip_content"></textarea>

            <div class="modal-actions">
              <button type="button" id="btn-cancel-tip" class="btn-cancel" data-i18n="btn_cancel">Cancelar</button>
              <button type="submit" class="btn-submit-post" data-i18n="btn_publish">Publicar</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Contenedor donde inyecta JS -->
      <div id="tips-container">
        <!-- Renderizado por JS -->
      </div>
    </div>
  </main>

  <div class="contact-component"></div>

  <footer></footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module" src="script/app.js"></script>
</body>

</html>
