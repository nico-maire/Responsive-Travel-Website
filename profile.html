<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Usuario</title>
  <link rel="icon" href="images/travel-svgrepo-com.svg" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css">
</head>

<body>

  <header></header>

  <div class="profile-container">

    <!-- Header Name -->
    <h1 class="profile-name">Nombre Apellido Apellido</h1>

    <!-- Profile Picture Placeholder -->
    <div class="profile-pic-wrapper">
      <!-- SVG Placeholder for Avatar -->
      <svg class="profile-pic" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="12" fill="#bfbfbf" />
        <circle cx="12" cy="8" r="4" fill="#e6e6e6" />
        <path d="M4 19C4 15.6863 7.58172 13 12 13C16.4183 13 20 15.6863 20 19" fill="#e6e6e6" />
      </svg>
    </div>

    <!-- About Section -->
    <div class="section about-section">
      <h3>Sobre mi</h3>
      <p>Say whatever you want about you this is a space where you can feel free to be yourself.</p>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="btn-grey">
        <!-- Map Icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
          <line x1="8" y1="2" x2="8" y2="18"></line>
          <line x1="16" y1="6" x2="16" y2="22"></line>
        </svg>
        Pais
      </button>
      <button class="btn-grey">
        <!-- Instagram Icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
        Instagram
      </button>
    </div>

    <!-- Badges Section -->
    <div class="section badges-section">
      <h3>Mis insignias</h3>
      <div class="badges-grid">
        <!-- Badge 1 -->
        <div class="badge-item">
          <div class="badge-circle">
            <i class="fa-solid fa-medal"></i>
          </div>
          <span>Insignia 1</span>
        </div>

        <!-- Badge 2 -->
        <div class="badge-item">
          <div class="badge-circle">
            <i class="fa-solid fa-medal"></i>
          </div>
          <span>Insignia 2</span>
        </div>

        <!-- Badge 3 -->
        <div class="badge-item">
          <div class="badge-circle">
            <i class="fa-solid fa-medal"></i>
          </div>
          <span>Insignia 3</span>
        </div>

        <!-- Badge 4 -->
        <div class="badge-item">
          <div class="badge-circle">
            <i class="fa-solid fa-medal"></i>
          </div>
          <span>Insignia 4</span>
        </div>
      </div>
    </div>

  </div>

  <div class="contact-component"></div>

  <footer></footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module" src="script/app.js"></script>

</body>

</html>
